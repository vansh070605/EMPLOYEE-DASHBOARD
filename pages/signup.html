<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Employee Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-container">
    <h2>Sign Up</h2>
    <form id="signupForm">
      <input type="text" id="signupName" required placeholder="Full Name" autocomplete="name" />
      <input type="email" id="signupEmail" required placeholder="Email" autocomplete="username" />
      <input type="password" id="signupPassword" required placeholder="Password" autocomplete="new-password" minlength="6" />
      <button type="submit">Sign Up</button>
      <div id="signupError" class="error"></div>
    </form>
    <p>Already have an account? <a href="../pages/login.html">Log in</a></p>
  </div>
  <script type="module" src="../js/signup.js"></script>
</body>
</html>
